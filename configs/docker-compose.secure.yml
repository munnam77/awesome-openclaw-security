# OpenClaw Secure Docker Compose Configuration
# Reference: https://github.com/munnam77/awesome-openclaw-security
#
# This is a production-hardened deployment configuration.
# See guides/docker-secure-deploy.md for detailed explanations.
#
# Usage:
#   cp configs/.env.example .env
#   # Edit .env with your values
#   docker compose -f configs/docker-compose.secure.yml up -d

version: "3.8"

services:
  openclaw:
    image: openclaw/openclaw:0.4.7
    container_name: openclaw-app
    restart: unless-stopped

    # Run as non-root user
    user: "1001:1001"

    # Read-only root filesystem
    read_only: true

    # Writable temporary directories (size-limited, RAM-backed)
    tmpfs:
      - /tmp:size=64M,mode=1777,uid=1001,gid=1001
      - /app/tmp:size=32M,mode=1770,uid=1001,gid=1001

    # Network: internal only (no direct internet access)
    networks:
      - openclaw-internal

    # Do NOT expose ports to host -- nginx handles external access
    # ports:
    #   - "127.0.0.1:8765:8765"  # Uncomment only for direct localhost access

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 100

    # Drop all Linux capabilities
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Volumes: minimal, specific, read-only where possible
    volumes:
      - openclaw-data:/app/data
      - openclaw-logs:/app/logs
      - ./config/gateway.yml:/app/config/gateway.yml:ro
      - ./skills:/app/skills:ro

    # Secrets (not environment variables)
    secrets:
      - openclaw_auth_token
      - openclaw_api_key

    environment:
      # Point to secret files, NOT inline values
      OPENCLAW_AUTH_TOKEN_FILE: /run/secrets/openclaw_auth_token
      OPENCLAW_API_KEY_FILE: /run/secrets/openclaw_api_key
      # Non-sensitive configuration
      OPENCLAW_GATEWAY_HOST: "127.0.0.1"
      OPENCLAW_GATEWAY_PORT: "8765"
      OPENCLAW_LOG_LEVEL: "info"
      OPENCLAW_LOG_FORMAT: "json"
      # Timezone
      TZ: "UTC"

    # Health check
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "openclaw"

  # Nginx reverse proxy -- handles TLS, rate limiting, security headers
  nginx:
    image: nginx:1.25-alpine
    container_name: openclaw-nginx
    restart: unless-stopped

    user: "101:101" # nginx user in alpine

    read_only: true
    tmpfs:
      - /tmp:size=16M
      - /var/cache/nginx:size=32M
      - /var/run:size=1M

    networks:
      - openclaw-internal
      - web-external

    ports:
      - "443:443"
      - "80:80"

    volumes:
      - ./configs/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      # Uncomment if using Let's Encrypt
      # - /etc/letsencrypt:/etc/letsencrypt:ro

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    depends_on:
      openclaw:
        condition: service_healthy

# Named volumes (Docker-managed, not bind mounts)
volumes:
  openclaw-data:
    driver: local
  openclaw-logs:
    driver: local

# Network isolation
networks:
  openclaw-internal:
    driver: bridge
    internal: true # No outbound internet access
  web-external:
    driver: bridge

# Docker secrets
secrets:
  openclaw_auth_token:
    # For Docker Swarm: use external secrets
    # external: true
    # For Docker Compose: use file-based secrets
    file: ./secrets/openclaw_auth_token
  openclaw_api_key:
    file: ./secrets/openclaw_api_key
