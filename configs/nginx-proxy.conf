# OpenClaw Nginx Reverse Proxy Configuration
# Reference: https://github.com/munnam77/awesome-openclaw-security
#
# Features:
#   - TLS termination with modern cipher suite
#   - Rate limiting (per-IP)
#   - Security headers (HSTS, CSP, X-Frame-Options, etc.)
#   - WebSocket proxy for OpenClaw gateway
#   - Request size limits
#   - IP allowlisting (optional)
#
# Usage:
#   1. Replace openclaw.yourdomain.com with your domain
#   2. Update SSL certificate paths
#   3. Optionally enable IP allowlisting
#   4. Test: nginx -t && nginx -s reload

# --- Rate Limiting Zones ---
# Limit requests per IP: 30 requests/minute for API, 10/minute for connections
limit_req_zone $binary_remote_addr zone=openclaw_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=openclaw_connect:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=openclaw_conn:10m;

# --- Optional: IP Allowlist ---
# Uncomment and add your trusted IPs to restrict access
# geo $allowed_ip {
#     default          0;
#     127.0.0.1/32     1;
#     10.0.0.0/8       1;  # VPN subnet
#     192.168.1.0/24   1;  # Local network
#     # Add your public IP:
#     # 203.0.113.50/32  1;
# }

# --- Upstream ---
upstream openclaw_gateway {
    server 127.0.0.1:8765;
    keepalive 16;
}

# --- Redirect HTTP to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name openclaw.yourdomain.com;

    # Allow health checks on HTTP
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# --- Main HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name openclaw.yourdomain.com;

    # --- TLS Configuration ---
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern TLS configuration (TLS 1.2+ only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # SSL session settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://openclaw.yourdomain.com; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Remove server version header
    server_tokens off;

    # --- Request Limits ---
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Limit request header size
    large_client_header_buffers 4 8k;

    # --- Optional: IP Allowlist Enforcement ---
    # Uncomment to enable IP restriction
    # if ($allowed_ip = 0) {
    #     return 403;
    # }

    # --- WebSocket Proxy to OpenClaw Gateway ---
    location /ws {
        # Rate limiting
        limit_req zone=openclaw_connect burst=5 nodelay;
        limit_conn openclaw_conn 5;

        # Proxy settings
        proxy_pass http://openclaw_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts (keep connections alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Buffer settings
        proxy_buffering off;
        proxy_buffer_size 4k;
    }

    # --- API Endpoint (if applicable) ---
    location /api/ {
        # Stricter rate limiting for API
        limit_req zone=openclaw_api burst=10 nodelay;
        limit_conn openclaw_conn 10;

        proxy_pass http://openclaw_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health Check Endpoint ---
    location /health {
        access_log off;
        proxy_pass http://openclaw_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --- Block everything else ---
    location / {
        return 444;
    }

    # --- Block sensitive paths ---
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ ^/(config|secrets|\.env|\.git) {
        deny all;
        return 404;
    }

    # --- Access Logging ---
    access_log /var/log/nginx/openclaw_access.log combined;
    error_log /var/log/nginx/openclaw_error.log warn;
}
