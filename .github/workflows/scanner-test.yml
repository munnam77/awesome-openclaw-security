name: Scanner CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run scanner demo
        run: |
          # Scanner exits 1 when threats found (expected for demo)
          python3 scanner/scan.py --demo && exit 1 || true

      - name: Run scanner demo (JSON output)
        run: |
          # Verify JSON output parses correctly and contains expected results
          output=$(python3 scanner/scan.py --demo --json 2>&1 || true)
          echo "$output"
          echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['skills_scanned']==3; assert d['summary']['fail']==1; assert d['summary']['warn']==1; assert d['summary']['pass']==1"

      - name: Run scanner version
        run: python3 scanner/scan.py --version
